name: Build hekate

# Сборка hekate — модуля экосистемы Ряженка (форк hekate/Nyx) через devkitARM.
# Build of hekate, a module of the Ряженка ecosystem (hekate/Nyx fork).

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build payload
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Export devkitPro environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> "$GITHUB_ENV"
          echo "/opt/devkitpro/devkitARM/bin" >> "$GITHUB_PATH"

      - name: Read version
        id: ver
        run: |
          MJ=$(grep -E '^BLVERSION_MAJOR' Versions.inc | grep -oE '[0-9]+' | head -n1)
          MN=$(grep -E '^BLVERSION_MINOR' Versions.inc | grep -oE '[0-9]+' | head -n1)
          HF=$(grep -E '^BLVERSION_HOTFX' Versions.inc | grep -oE '[0-9]+' | head -n1)
          echo "version=${MJ}.${MN}.${HF}" >> "$GITHUB_OUTPUT"
          echo "Building version ${MJ}.${MN}.${HF}"

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Package SD layout
        run: |
          chmod +x scripts/package-sd.sh
          scripts/package-sd.sh dist
          echo "----- output/ -----"
          ls -la output || true
          echo "----- dist/ -----"
          find dist -type f | sort

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hekate-${{ steps.ver.outputs.version }}
          path: dist
          if-no-files-found: error
