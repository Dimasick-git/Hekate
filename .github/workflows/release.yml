name: Release hekate

# Крафтит релиз hekate (модуль экосистемы Ряженка) под текущую версию из Versions.inc.
# Тег = номер версии (например, 6.5.2). Если релиз с таким тегом уже есть —
# файлы в нём просто перезаписываются.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Export devkitPro environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> "$GITHUB_ENV"
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> "$GITHUB_ENV"
          echo "/opt/devkitpro/devkitARM/bin" >> "$GITHUB_PATH"

      - name: Read version
        id: ver
        run: |
          MJ=$(grep -E '^BLVERSION_MAJOR' Versions.inc | grep -oE '[0-9]+' | head -n1)
          MN=$(grep -E '^BLVERSION_MINOR' Versions.inc | grep -oE '[0-9]+' | head -n1)
          HF=$(grep -E '^BLVERSION_HOTFX' Versions.inc | grep -oE '[0-9]+' | head -n1)
          echo "version=${MJ}.${MN}.${HF}" >> "$GITHUB_OUTPUT"
          echo "Releasing version ${MJ}.${MN}.${HF}"

      - name: Build
        run: make -j"$(nproc)"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output
          if-no-files-found: error

  lockpick:
    name: Build patched Lockpick (autokeys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Lockpick 1.9.20 source and apply autokeys patch
        run: |
          curl -sSL "https://github.com/THZoria/Lockpick_RCMaster/archive/refs/tags/1.9.20.tar.gz" -o lp.tgz
          mkdir lp && tar -xf lp.tgz -C lp --strip-components=1
          patch -p1 -d lp < res/lockpick-autokeys.patch

      - name: Build in devkitARM container
        run: |
          docker run --rm -v "$PWD/lp:/work" -w /work devkitpro/devkitarm:latest \
            sh -c 'make -j"$(nproc)"'

      - name: Collect lockpick.bin
        run: |
          mkdir -p out && cp lp/output/Lockpick_RCM.bin out/lockpick.bin

      - name: Upload lockpick
        uses: actions/upload-artifact@v4
        with:
          name: lockpick-build
          path: out/lockpick.bin
          if-no-files-found: error

  release:
    name: Craft release
    needs: [build, lockpick]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: output

      - name: Download patched Lockpick
        uses: actions/download-artifact@v4
        with:
          name: lockpick-build
          path: output

      - name: Assemble release package
        run: |
          VER="${{ needs.build.outputs.version }}"
          chmod +x scripts/package-sd.sh
          scripts/package-sd.sh pkg
          mkdir -p dist
          cp pkg/payload.bin dist/payload.bin
          ( cd pkg && zip -qr "../dist/hekate_${VER}.zip" . )
          echo "----- pkg/ -----"; find pkg -type f | sort
          echo "----- dist/ -----"; ls -la dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/make-release.sh
          scripts/make-release.sh dist "${GITHUB_SHA}"
